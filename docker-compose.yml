version: "3.9"

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-diabetes_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-diabetes_password123!}
      POSTGRES_DB: ${POSTGRES_DB:-diabetes_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U diabetes_admin -d diabetes_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ml_artifacts:/app/app/ml/artifacts
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://diabetes_admin:diabetes_password123!@db:5432/diabetes_db
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["celery", "-A", "app.core.celery_app.celery", "worker", "--loglevel=info"]
    volumes:
      - ml_artifacts:/app/app/ml/artifacts
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://diabetes_admin:diabetes_password123!@db:5432/diabetes_db
      REDIS_URL: redis://redis:6379/0
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:8000
      - NEXT_PUBLIC_API_URL=
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  ml_artifacts:
